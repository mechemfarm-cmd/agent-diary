name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: agent-diary-linux
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact: agent-diary-macos
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: agent-diary-windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List files for debugging
        run: find . -type f | sort

      - name: Create Release
        run: |
          cd agent-diary-macos
          ls -la
          cd ..
          gh release create "${{ github.ref_name }}" \
            --draft --generate-notes \
            --title "Agent Diary ${{ github.ref_name }}" \
            agent-diary-macos/*.dmg agent-diary-linux/*.deb agent-diary-linux/*.AppImage agent-diary-windows/*.msi
        env:
          GH_TOKEN: ${{ github.token }}